<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShotLingua | Language Selection</title>
  <meta
    name="description"
    content="Choose your language to view the ShotLingua app introduction page."
  />

  <link rel="alternate" hreflang="ja" href="https://waytogo-ta.github.io/-shotlingua-site/marketing.html" />
  <link rel="alternate" hreflang="en" href="https://waytogo-ta.github.io/-shotlingua-site/marketing-en.html" />
  <link rel="alternate" hreflang="ko" href="https://waytogo-ta.github.io/-shotlingua-site/marketing-ko.html" />
  <link rel="alternate" hreflang="zh" href="https://waytogo-ta.github.io/-shotlingua-site/marketing-zh.html" />
  <link rel="alternate" hreflang="x-default" href="https://waytogo-ta.github.io/-shotlingua-site/language.html" />

  <style>
    :root {
      --bg: #f7f6f2;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --pill: rgba(15, 118, 110, 0.1);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.7;
    }

    .wrap {
      width: 100%;
      max-width: 720px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--pill);
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .lead {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
    }

    .lang-grid {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .lang-link {
      display: block;
      text-decoration: none;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .lang-link:hover {
      border-color: var(--primary);
      background: #f4fbfa;
      transform: translateY(-1px);
    }

    .lang-link.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .lang-link.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .note a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .note a:hover {
      text-decoration: underline;
    }

    @media (min-width: 768px) {
      .card {
        padding: 40px 36px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <div class="badge">ShotLingua</div>
      <h1>言語を選択してください</h1>
      <p class="lead">
        ShotLingua の紹介ページを、お好きな言語でご覧いただけます。
        下のボタンから言語を選択してください。
      </p>

      <div class="lang-grid">
        <a class="lang-link primary" href="marketing.html">日本語</a>
        <a class="lang-link" href="marketing-en.html">English</a>
        <a class="lang-link" href="marketing-ko.html">한국어</a>
        <a class="lang-link" href="marketing-zh.html">中文</a>
      </div>

      <p class="note">
        サポートページは
        <a href="https://waytogo-ta.github.io/-shotlingua-site/" target="_blank" rel="noopener noreferrer">こちら</a>
        です。
      </p>
    </main>
  </div>
</body>
</html>
