<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShotLingua | Language Selection</title>
  <meta
    name="description"
    content="Choose your language to view the ShotLingua app introduction page."
  />

<link rel="alternate" hreflang="ja" href="https://waytogo-ta.github.io/-shotlingua-site/marketing.html" />
<link rel="alternate" hreflang="en" href="https://waytogo-ta.github.io/-shotlingua-site/marketing-en.html" />
<link rel="alternate" hreflang="ko" href="https://waytogo-ta.github.io/-shotlingua-site/marketing-ko.html" />
<link rel="alternate" hreflang="zh" href="https://waytogo-ta.github.io/-shotlingua-site/marketing-zh.html" />
<link rel="alternate" hreflang="x-default" href="https://waytogo-ta.github.io/-shotlingua-site/language.html" />


  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.7;
    }

    .card {
      width: min(720px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: var(--shadow);
    }

    .label {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.08);
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.1;
    }

    .lead {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .lang-link {
      display: block;
      text-decoration: none;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      padding: 16px 18px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .lang-link:hover {
      border-color: var(--primary);
      background: #f7fbfa;
    }

    .lang-link.primary {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }

    .lang-link.primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .small {
      margin-top: 18px;
      font-size: 14px;
      color: var(--muted);
    }

    .small a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .small a:hover {
      text-decoration: underline;
    }

    @media (min-width: 768px) {
      .card {
        padding: 40px 36px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="label">ShotLingua</div>
    <h1>言語を選択してください</h1>
    <p class="lead">
      ご利用の言語に合わせて、ShotLingua の紹介ページを選択できます。
      下のリンクからお好きな言語を選んでください。
    </p>

    <div class="links">
      <a class="lang-link primary" href="marketing.html">日本語</a>
      <a class="lang-link" href="marketing-en.html">English</a>
      <a class="lang-link" href="marketing-ko.html">한국어</a>
      <a class="lang-link" href="marketing-zh.html">中文</a>
    </div>

    <p class="small">
      サポートページを見る場合は
      <a href="https://waytogo-ta.github.io/-shotlingua-site/" target="_blank" rel="noopener noreferrer">こちら</a>
      をご利用ください。
    </p>
  </main>

  <script>
    (function () {
      var lang = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
      lang = lang.toLowerCase();

      if (lang.startsWith("ja")) {
        window.location.replace("marketing.html");
      } else if (lang.startsWith("ko")) {
        window.location.replace("marketing-ko.html");
      } else if (lang.startsWith("zh")) {
        window.location.replace("marketing-zh.html");
      } else {
        window.location.replace("marketing-en.html");
      }
    })();
  </script>
</body>
</html>
